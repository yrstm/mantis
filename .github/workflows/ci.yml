name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run benchmark
      - run: npm run types:check
      - run: npm pack --dry-run

  demo-browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm i --no-save playwright
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser

  macos-screen-capture:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: swift build
        working-directory: helpers/macos-screen-capture
      - run: .build/debug/mantis-screen-capture --version
        working-directory: helpers/macos-screen-capture
      - run: node mantis-normalize.js --version
        working-directory: helpers/macos-screen-capture
